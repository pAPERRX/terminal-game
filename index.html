<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>> ACCESS TERMINAL ✦ ПРЕМИУМ</title>
    <style>
        /* ========== СБРОС И БАЗОВЫЕ СТИЛИ ========== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            overflow: hidden;
            height: 100%;
            position: relative;
        }

        body {
            min-height: 100vh;
            font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px;
            position: relative;
            overflow-x: hidden;
            transition: background 0.8s cubic-bezier(0.4, 0, 0.2, 1), 
                        color 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }

        #app {
            height: 100%;
            width: 100%;
            overflow-y: auto;
            overflow-x: hidden;
            position: relative;
            -webkit-overflow-scrolling: touch;
        }

        /* ========== ПРЕМИУМ ПАРАЛЛАКС ФОН ========== */
        .premium-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            overflow: hidden;
            pointer-events: none;
        }

        .gradient-sphere {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.5;
            animation: sphereFloat 30s ease-in-out infinite;
        }

        .sphere-1 {
            width: 80vmax;
            height: 80vmax;
            top: -20%;
            right: -20%;
            background: radial-gradient(circle at 30% 50%, 
                        rgba(255, 105, 180, 0.3) 0%, 
                        rgba(147, 112, 219, 0.2) 40%, 
                        transparent 70%);
            animation-delay: -5s;
        }

        .sphere-2 {
            width: 100vmax;
            height: 100vmax;
            bottom: -30%;
            left: -20%;
            background: radial-gradient(circle at 70% 50%, 
                        rgba(255, 182, 193, 0.25) 0%, 
                        rgba(255, 105, 180, 0.2) 40%, 
                        transparent 70%);
            animation-delay: -10s;
        }

        .sphere-3 {
            width: 70vmax;
            height: 70vmax;
            top: 10%;
            left: 10%;
            background: radial-gradient(circle at 50% 50%, 
                        rgba(255, 20, 147, 0.2) 0%, 
                        rgba(255, 105, 180, 0.15) 30%, 
                        transparent 60%);
            animation-delay: -15s;
        }

        .grid-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(255, 105, 180, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 105, 180, 0.05) 1px, transparent 1px);
            background-size: 50px 50px;
            animation: gridPulse 8s ease-in-out infinite;
        }

        .noise-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-radial-gradient(circle at 30% 30%, 
                        rgba(255, 255, 255, 0.02) 0%, 
                        transparent 5%),
                        repeating-linear-gradient(45deg, 
                        rgba(0, 0, 0, 0.02) 0px, 
                        rgba(0, 0, 0, 0.02) 2px, 
                        transparent 2px, 
                        transparent 8px);
            opacity: 0.3;
            pointer-events: none;
            animation: noiseShift 10s steps(10) infinite;
            mix-blend-mode: overlay;
        }

        .parallax-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" opacity="0.1"><circle cx="10" cy="10" r="1" fill="%23ff69b4"/><circle cx="90" cy="30" r="1.5" fill="%23ff69b4"/><circle cx="30" cy="80" r="1" fill="%23ff69b4"/><circle cx="70" cy="20" r="2" fill="%23ff69b4"/><circle cx="50" cy="60" r="1" fill="%23ff69b4"/></svg>');
            background-size: 200px 200px;
            animation: parallaxMove 40s linear infinite;
            opacity: 0.2;
        }

        .parallax-layer-2 {
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" opacity="0.1"><circle cx="20" cy="20" r="2" fill="%23ff1493"/><circle cx="80" cy="70" r="1.5" fill="%23ff1493"/><circle cx="40" cy="90" r="1" fill="%23ff1493"/><circle cx="60" cy="40" r="2" fill="%23ff1493"/></svg>');
            background-size: 300px 300px;
            animation: parallaxMove 60s linear infinite reverse;
            opacity: 0.15;
        }

        @keyframes sphereFloat {
            0%, 100% { transform: translate(0, 0) scale(1) rotate(0deg); }
            33% { transform: translate(5%, 3%) scale(1.1) rotate(120deg); }
            66% { transform: translate(-3%, 5%) scale(0.9) rotate(240deg); }
        }

        @keyframes gridPulse {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 0.6; transform: scale(1.01); }
        }

        @keyframes noiseShift {
            0%, 100% { transform: translate(0, 0); }
            10% { transform: translate(-1%, -1%); }
            20% { transform: translate(1%, 1%); }
            30% { transform: translate(-2%, 0); }
            40% { transform: translate(2%, 2%); }
            50% { transform: translate(0, -2%); }
            60% { transform: translate(-1%, 2%); }
            70% { transform: translate(1%, -1%); }
            80% { transform: translate(-2%, -2%); }
            90% { transform: translate(2%, 1%); }
        }

        @keyframes parallaxMove {
            0% { background-position: 0 0; }
            100% { background-position: 200px 200px; }
        }

        /* ========== ПРЕМИУМ КОМПОНЕНТЫ ========== */
        .glass-card {
            background: rgba(20, 10, 20, 0.4);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid rgba(255, 105, 180, 0.2);
            border-radius: 32px;
            box-shadow: 
                0 20px 40px -15px rgba(0, 0, 0, 0.5),
                0 0 0 1px rgba(255, 105, 180, 0.1) inset,
                0 0 30px rgba(255, 105, 180, 0.1);
            position: relative;
            overflow: hidden;
        }

        .glass-card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 30% 30%, 
                        rgba(255, 255, 255, 0.05) 0%, 
                        transparent 70%);
            opacity: 0;
            pointer-events: none;
        }

        .glass-card:hover,
        .glass-card:active,
        .glass-card:focus {
            background: rgba(20, 10, 20, 0.4);
            border-color: rgba(255, 105, 180, 0.2);
            box-shadow: 
                0 20px 40px -15px rgba(0, 0, 0, 0.5),
                0 0 0 1px rgba(255, 105, 180, 0.1) inset,
                0 0 30px rgba(255, 105, 180, 0.1);
            transform: none;
        }

        .glass-card:hover::before {
            opacity: 0;
        }

        .glass-card-deep {
            background: rgba(15, 5, 15, 0.6);
            backdrop-filter: blur(30px) saturate(200%);
            -webkit-backdrop-filter: blur(30px) saturate(200%);
            border: 1px solid rgba(255, 105, 180, 0.15);
            border-radius: 40px;
            box-shadow: 
                0 25px 50px -12px rgba(0, 0, 0, 0.6),
                0 0 0 1px rgba(255, 105, 180, 0.1) inset;
        }

        .neon-border {
            position: relative;
            border-radius: 32px;
            overflow: hidden;
        }

        .neon-border::before {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            background: linear-gradient(45deg, 
                #ff69b4, #ff1493, #ff69b4, #ff1493, #ff69b4);
            background-size: 400% 400%;
            border-radius: 34px;
            animation: gradientShift 6s ease infinite;
            opacity: 0;
            transition: opacity 0.3s;
            z-index: -1;
        }

        .neon-border:hover::before {
            opacity: 0;
        }

        @keyframes gradientShift {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        .shine-effect {
            position: relative;
            overflow: hidden;
        }

        .shine-effect::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -60%;
            width: 200%;
            height: 200%;
            background: linear-gradient(
                to right,
                transparent,
                rgba(255, 255, 255, 0.1),
                transparent
            );
            transform: rotate(25deg);
            animation: shine 6s infinite;
        }

        @keyframes shine {
            0% { left: -60%; }
            20% { left: 100%; }
            100% { left: 100%; }
        }

        .premium-button {
            background: linear-gradient(135deg, 
                rgba(255, 105, 180, 0.2) 0%, 
                rgba(255, 20, 147, 0.3) 100%);
            border: 1.5px solid rgba(255, 105, 180, 0.4);
            border-radius: 60px;
            padding: 14px 28px;
            font-size: 16px;
            font-weight: 600;
            letter-spacing: 0.5px;
            color: white;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            box-shadow: 
                0 10px 20px -8px rgba(255, 105, 180, 0.3),
                0 0 0 1px rgba(255, 255, 255, 0.1) inset;
        }

        .premium-button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(
                90deg,
                transparent,
                rgba(255, 255, 255, 0.2),
                transparent
            );
            transition: left 0.5s;
        }

        .premium-button:hover {
            transform: none;
            border-color: rgba(255, 105, 180, 0.4);
            box-shadow: 
                0 10px 20px -8px rgba(255, 105, 180, 0.3),
                0 0 0 1px rgba(255, 255, 255, 0.1) inset;
        }

        .premium-button:hover::before {
            left: -100%;
        }

        .premium-button:active {
            transform: scale(0.98);
        }

        .floating-particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: #ff69b4;
            border-radius: 50%;
            box-shadow: 0 0 20px #ff69b4;
            animation: particleFloat 15s linear infinite;
            opacity: 0.3;
            pointer-events: none;
            z-index: 2;
        }

        @keyframes particleFloat {
            0% {
                transform: translateY(100vh) scale(1);
                opacity: 0;
            }
            10% {
                opacity: 0.5;
            }
            90% {
                opacity: 0.5;
            }
            100% {
                transform: translateY(-100vh) scale(2);
                opacity: 0;
            }
        }

        .gradient-text {
            background: linear-gradient(135deg, #ff69b4, #ff1493, #ff69b4);
            background-size: 200% auto;
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            animation: textShine 3s linear infinite;
        }

        @keyframes textShine {
            0% { background-position: 0% 50%; }
            100% { background-position: 200% 50%; }
        }

        .glitch-text {
            position: relative;
            animation: glitch 5s infinite;
        }

        @keyframes glitch {
            0%, 100% { transform: translate(0); text-shadow: 0 0 10px #ff69b4; }
            10% { transform: translate(-2px, 1px); text-shadow: -3px 0 #ff69b4, 3px 0 #00ffff; }
            11% { transform: translate(2px, -1px); text-shadow: 3px 0 #ff69b4, -3px 0 #00ffff; }
            12% { transform: translate(0); text-shadow: 0 0 10px #ff69b4; }
        }

        .typing-animation {
            overflow: hidden;
            white-space: nowrap;
            border-right: 3px solid #ff69b4;
            animation: typing 4s steps(40, end), blinkCursor 1s step-end infinite;
        }

        @keyframes typing {
            from { width: 0; }
            to { width: 100%; }
        }

        @keyframes blinkCursor {
            from, to { border-color: transparent; }
            50% { border-color: #ff69b4; }
        }

        .stagger-fade-in > * {
            opacity: 0;
            animation: slideIn 0.5s cubic-bezier(0.215, 0.610, 0.355, 1) forwards;
        }

        .stagger-fade-in > *:nth-child(1) { animation-delay: 0.1s; }
        .stagger-fade-in > *:nth-child(2) { animation-delay: 0.15s; }
        .stagger-fade-in > *:nth-child(3) { animation-delay: 0.2s; }
        .stagger-fade-in > *:nth-child(4) { animation-delay: 0.25s; }
        .stagger-fade-in > *:nth-child(5) { animation-delay: 0.3s; }
        .stagger-fade-in > *:nth-child(6) { animation-delay: 0.35s; }
        .stagger-fade-in > *:nth-child(7) { animation-delay: 0.4s; }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(30px) scale(0.95);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .hover-lift {
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .hover-lift:hover {
            transform: none;
        }

        .pulse {
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.05); opacity: 0.8; }
        }

        .binary-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            opacity: 0.08;
            pointer-events: none;
            font-family: 'Courier New', monospace;
            font-size: 18px;
            line-height: 1.2;
            color: #ff69b4;
            white-space: nowrap;
            overflow: hidden;
            transition: opacity 3s, color 3s;
        }

        .binary-column {
            position: absolute;
            top: -300px;
            width: 25px;
            text-align: center;
            animation: fall linear infinite;
            text-shadow: 0 0 5px currentColor;
        }

        @keyframes fall {
            from { transform: translateY(0); }
            to { transform: translateY(200vh); }
        }

        .terminal {
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            width: 90%;
            max-width: 500px;
            border: 2px solid #0f0;
            padding: 15px;
            position: relative;
            z-index: 10;
            box-shadow: 0 0 40px rgba(0, 255, 0, 0.2);
            transition: all 3s;
            margin: 0 auto;
            border-radius: 20px;
        }

        .terminal.melting {
            border-color: #ff69b4;
            box-shadow: 0 0 60px rgba(255, 105, 180, 0.4);
            opacity: 0.9;
            transform: scale(0.95) rotate(0.5deg);
            filter: blur(1px);
        }

        .line {
            color: inherit;
            font-size: 14px;
            line-height: 1.4;
            margin-bottom: 5px;
        }

        .system {
            color: inherit;
            font-size: 12px;
            margin-bottom: 10px;
            opacity: 0.9;
        }

        .input-line {
            display: flex;
            align-items: center;
            margin: 15px 0;
            gap: 8px;
            flex-wrap: wrap;
        }

        .prompt {
            color: inherit;
            font-size: 16px;
        }

        input {
            background: #000;
            border: 1px solid currentColor;
            color: inherit;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            padding: 6px 10px;
            width: 180px;
            outline: none;
            flex: 1;
            min-width: 150px;
            border-radius: 30px;
        }

        input:focus {
            background: #111;
        }

        .error {
            border-color: #f00;
            color: #f00;
        }

        hr {
            border: none;
            border-top: 1px solid currentColor;
            margin: 10px 0;
            opacity: 0.3;
        }

        .progress-container {
            width: 100%;
            height: 15px;
            background: #111;
            border: 1px solid currentColor;
            margin: 15px 0;
            overflow: hidden;
            position: relative;
        }

        .progress-fill {
            height: 100%;
            width: 0%;
            background: currentColor;
            transition: width 0.1s linear;
            position: relative;
            overflow: hidden;
        }

        .progress-fill::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            animation: progressShine 2s infinite;
        }

        @keyframes progressShine {
            0% { left: -100%; }
            20% { left: 100%; }
            100% { left: 100%; }
        }

        .progress-text {
            text-align: center;
            font-size: 14px;
            margin-bottom: 15px;
        }

        .soft-screen {
            background: transparent;
            min-height: 100vh;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 15px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow-y: visible;
            position: relative;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            -webkit-overflow-scrolling: touch;
            z-index: 5;
        }

        .floating-hearts {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 3;
            display: block;
        }

        .heart-particle {
            position: absolute;
            bottom: -30px;
            color: rgba(255, 105, 180, 0.4);
            font-size: 18px;
            animation: floatHeart linear infinite;
            text-shadow: 0 0 15px rgba(255, 105, 180, 0.5);
            filter: blur(0.3px);
        }

        @keyframes floatHeart {
            0% { transform: translateY(0) rotate(0deg) scale(0.8); opacity: 0; }
            10% { opacity: 0.5; }
            50% { opacity: 0.4; }
            90% { opacity: 0.3; }
            100% { transform: translateY(-100vh) rotate(360deg) scale(1.1); opacity: 0; }
        }

        .pulse-dots {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 2;
            opacity: 0.3;
            display: block;
        }

        .pulse-dot {
            position: absolute;
            width: 3px;
            height: 3px;
            background: #ff69b4;
            border-radius: 50%;
            box-shadow: 0 0 10px #ff69b4;
            animation: pulseDot 3s ease-in-out infinite;
        }

        @keyframes pulseDot {
            0% { opacity: 0.2; transform: scale(1); }
            50% { opacity: 0.6; transform: scale(1.8); }
            100% { opacity: 0.2; transform: scale(1); }
        }

        .moving-lines {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 2;
            opacity: 0.15;
            display: block;
        }

        .line-particle {
            position: absolute;
            width: 1px;
            height: 80px;
            background: linear-gradient(to bottom, transparent, #ff69b4, transparent);
            animation: moveLine 12s linear infinite;
        }

        @keyframes moveLine {
            from { transform: translateY(-100%); }
            to { transform: translateY(100vh); }
        }

        .soft-card {
            background: rgba(42, 42, 42, 0.85);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 25px 20px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 15px 40px rgba(255, 105, 180, 0.3);
            text-align: center;
            border: 2px solid rgba(255, 105, 180, 0.4);
            margin: 10px auto;
            position: relative;
            z-index: 10;
        }

        /* Стили для сообщений (такие же как главное меню) */
        .message-card {
            background: rgba(42, 42, 42, 0.85);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 30px 25px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 15px 40px rgba(255, 105, 180, 0.3);
            border: 2px solid rgba(255, 105, 180, 0.4);
            margin: 10px auto;
            position: relative;
            z-index: 10;
        }

        .message-title {
            font-size: 28px;
            color: #ff69b4;
            margin-bottom: 25px;
            text-align: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-shadow: 0 0 15px rgba(255, 105, 180, 0.5);
        }

        .message-text {
            color: white;
            font-size: 16px;
            line-height: 1.7;
            margin-bottom: 30px;
            white-space: pre-line;
            text-align: left;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .message-text p {
            margin-bottom: 15px;
        }

        .message-button {
            background: linear-gradient(135deg, 
                rgba(255, 105, 180, 0.2) 0%, 
                rgba(255, 20, 147, 0.3) 100%);
            border: 1.5px solid rgba(255, 105, 180, 0.4);
            border-radius: 60px;
            padding: 14px 28px;
            font-size: 16px;
            font-weight: 600;
            color: white;
            cursor: pointer;
            margin: 15px auto;
            display: block;
            max-width: 280px;
            width: 100%;
            transition: all 0.3s;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            box-shadow: 0 10px 20px -8px rgba(255, 105, 180, 0.3);
        }

        .message-button:hover {
            transform: scale(1.02);
            border-color: rgba(255, 105, 180, 0.8);
            box-shadow: 0 20px 30px -10px rgba(255, 105, 180, 0.5);
        }

        .message-button:active {
            transform: scale(0.98);
        }

        .message-button.secondary {
            background: transparent;
            border-color: #ff69b4;
            color: #ff69b4;
        }

        .message-button.secondary:hover {
            background: rgba(255, 105, 180, 0.1);
        }

        .soft-title {
            font-size: 32px;
            color: #ff69b4;
            margin-bottom: 20px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-shadow: 0 0 15px rgba(255, 105, 180, 0.5);
        }

        .soft-text {
            font-size: 16px;
            line-height: 1.5;
            color: white;
            margin-bottom: 30px;
        }

        .game-menu {
            display: flex;
            flex-direction: column;
            gap: 10px;
            width: 100%;

                        selectedOption = optionIdx;
                        questionAnswered = true;
                        
                        if (!question.anyAnswer && optionIdx !== question.correct) {
                            errors++;
                        }
                        
                        if (errors >= MAX_ERRORS) {
                            gameFailed = true;
                        }
                        
                        renderGame4();
                    });
                });

                if (document.getElementById('nextQuestionBtn')) {
                    document.getElementById('nextQuestionBtn').addEventListener('click', () => {
                        currentIndex++;
                        questionAnswered = false;
                        selectedOption = null;
                        renderGame4();
                    });
                }

                if (document.getElementById('finishTestBtn')) {
                    document.getElementById('finishTestBtn').addEventListener('click', () => {
                        if (errors < MAX_ERRORS) {
                            gameCompleted = true;
                            renderGame4();
                        }
                    });
                }
            }

            renderGame4();
        }

        // ========== ИГРА 5 ==========
        function showGame5() {
            const hearts = ['❤️', '💖', '💗', '💓', '💕', '💘', '💝', '💞'];
            const evilStuff = ['💩', '👻', '💀', '👹', '🤡', '👿', '👽', '💔'];

            class ReactionGame {
                constructor() {
                    this.round = 1;
                    this.totalRounds = 3;
                    this.hits = 0;
                    this.errors = 0;
                    this.targetsPerRound = 15;
                    this.activeTargets = [];
                    this.gameActive = false;
                    this.roundActive = false;
                    this.baseInterval = 1000;
                    this.targetLifetime = 1500;
                    this.gameLoop = null;
                    this.timeouts = [];
                }

                getSpeedMultiplier() {
                    return 1 - (this.round - 1) * 0.15;
                }

                getInterval() {
                    return this.baseInterval * this.getSpeedMultiplier();
                }

                clearAllTimeouts() {
                    this.timeouts.forEach(t => clearTimeout(t));
                    this.timeouts = [];
                }

                startGame() {
                    if (this.gameLoop) clearInterval(this.gameLoop);
                    this.clearAllTimeouts();
                    
                    this.round = 1;
                    this.hits = 0;
                    this.errors = 0;
                    this.gameActive = true;
                    this.render();
                    this.nextRound();
                }

                nextRound() {
                    if (this.round > this.totalRounds) {
                        this.gameActive = false;
                        this.renderVictory();
                        return;
                    }

                    this.roundActive = true;
                    this.targetsThisRound = 0;
                    this.activeTargets.forEach(t => t.remove());
                    this.activeTargets = [];
                    
                    this.render();
                    this.startRound();
                }

                startRound() {
                    const interval = this.getInterval();
                    
                    this.gameLoop = setInterval(() => {
                        if (!this.roundActive || !this.gameActive) return;
                        
                        if (this.targetsThisRound >= this.targetsPerRound) {
                            clearInterval(this.gameLoop);
                            this.roundActive = false;
                            this.round++;
                            this.nextRound();
                            return;
                        }

                        this.spawnTarget();
                        this.targetsThisRound++;
                    }, interval);
                }

                spawnTarget() {
                    const playArea = document.querySelector('.play-area');
                    if (!playArea || !this.roundActive) return;

                    const isHeart = Math.random() > 0.5;
                    const emoji = isHeart ? 
                        hearts[Math.floor(Math.random() * hearts.length)] : 
                        evilStuff[Math.floor(Math.random() * evilStuff.length)];

                    const target = document.createElement('div');
                    target.className = `target ${isHeart ? 'heart' : 'evil'}`;
                    target.textContent = emoji;
                    target.dataset.type = isHeart ? 'heart' : 'evil';

                    const left = Math.random() * (playArea.clientWidth - 50);
                    const top = Math.random() * (playArea.clientHeight - 50);
                    target.style.left = left + 'px';
                    target.style.top = top + 'px';

                    target.addEventListener('click', (e) => {
                        e.stopPropagation();
                        if (!this.roundActive || !this.gameActive) return;
                        
                        if (isHeart) {
                            this.hits++;
                            target.style.transform = 'scale(1.5)';
                            setTimeout(() => target.remove(), 100);
                        } else {
                            this.errors++;
                            target.style.transform = 'scale(0.5)';
                            target.style.opacity = '0';
                            setTimeout(() => target.remove(), 100);
                        }
                        
                        this.activeTargets = this.activeTargets.filter(t => t !== target);
                        
                        if (this.errors >= 3) {
                            this.gameOver();
                            return;
                        }
                        
                        this.updateStats();
                    });

                    playArea.appendChild(target);
                    this.activeTargets.push(target);

                    const timeout = setTimeout(() => {
                        if (target.parentNode && this.roundActive && this.gameActive) {
                            target.remove();
                            this.activeTargets = this.activeTargets.filter(t => t !== target);
                            
                            if (isHeart) {
                                this.errors++;
                                if (this.errors >= 3) {
                                    this.gameOver();
                                    return;
                                }
                                this.updateStats();
                            }
                        }
                    }, this.targetLifetime);
                    
                    this.timeouts.push(timeout);
                }

                gameOver() {
                    this.gameActive = false;
                    this.roundActive = false;
                    clearInterval(this.gameLoop);
                    this.clearAllTimeouts();
                    
                    this.activeTargets.forEach(t => t.remove());
                    this.activeTargets = [];
                    
                    this.renderGameOver();
                }

                updateStats() {
                    const hitsEl = document.getElementById('hitsCount');
                    const errorsEl = document.getElementById('errorsCount');
                    
                    if (hitsEl) hitsEl.textContent = this.hits;
                    if (errorsEl) errorsEl.textContent = this.errors;
                }

                render() {
                    app.innerHTML = `
                        <div class="soft-screen">
                            <div class="game-container glass-card">
                                <div class="game-header glass-card">
                                    <div class="game-title gradient-text">⚡ ЛОВИ СЕРДЕЧКИ</div>
                                    <div class="stats">
                                        <div class="stat-box">❤️ <span id="hitsCount">${this.hits}</span></div>
                                        <div class="stat-box">❌ <span id="errorsCount">${this.errors}</span>/3</div>
                                    </div>
                                </div>

                                <div class="info-panel">
                                    <div>Раунд ${this.round}/${this.totalRounds}</div>
                                    <div class="speed-indicator">⚡ x${(1/this.getSpeedMultiplier()).toFixed(1)}</div>
                                </div>

                                <div class="play-area glass-card-deep" style="height: 350px;"></div>

                                <div class="controls">
                                    <button class="premium-button" id="restartBtn">🔄 ЗАНОВО</button>
                                </div>
                            </div>
                        </div>
                    `;

                    document.getElementById('restartBtn').addEventListener('click', () => {
                        this.startGame();
                    });
                }

                renderGameOver() {
                    app.innerHTML = `
                        <div class="soft-screen">
                            <div class="game-container glass-card">
                                <div class="game-over">
                                    <h2 class="glitch-text" style="color: #f44336;">💔 ПРОИГРЫШ</h2>
                                    <p>3 ошибки</p>
                                    <button class="back-btn premium-button" id="restartBtn">🔄 ЗАНОВО</button>
                                    <button class="back-btn premium-button" id="menuBtn">← В МЕНЮ</button>
                                </div>
                            </div>
                        </div>
                    `;

                    document.getElementById('restartBtn').addEventListener('click', () => {
                        this.startGame();
                    });
                    
                    document.getElementById('menuBtn').addEventListener('click', showGameMenu);
                }

                renderVictory() {
                    app.innerHTML = `
                        <div class="soft-screen">
                            <div class="game-container glass-card">
                                <div class="victory">
                                    <h2 class="gradient-text">🎉 ПОБЕДА!</h2>
                                    <p>Сердечек: ${this.hits}</p>
                                    <p>Ошибок: ${this.errors}</p>
                                    <button class="get-digit-btn premium-button" id="getDigitBtn5">🎁 ЦИФРА 8</button>
                                </div>
                            </div>
                        </div>
                    `;

                    document.getElementById('getDigitBtn5').addEventListener('click', () => {
                        collectedDigits[4] = '8';
                        showGameMenu();
                    });
                }
            }

            const game = new ReactionGame();
            game.startGame();
        }

        // ========== ОБНОВЛЁННАЯ ИГРА 6 ==========
        function showGame6() {
            let currentRound = 0;
            let score = 0;
            let mistakes = 0;
            const MAX_MISTAKES = 3;
            let gameCompleted = collectedDigits[5] !== '_';
            let gameFailed = false;
            let roundAnswered = false;
            let selectedItem = null;
            
            let shuffledRounds = game6Rounds.map(round => ({
                ...round,
                shuffledItems: shuffleArray(round.items)
            }));

            function renderGame6() {
                if (gameFailed) {
                    app.innerHTML = `
                        <div class="soft-screen">
                            <div class="game-container glass-card">
                                <div class="game-header glass-card">
                                    <div class="game-title gradient-text">🎮 НАЙДИ ЛИШНЕЕ</div>
                                    <div class="digit-box pulse">${collectedDigits[5] !== '_' ? '2' : '_'}</div>
                                </div>
                                
                                <div class="game-over">
                                    <h2 class="glitch-text" style="color: #f44336;">💔 ПРОИГРЫШ</h2>
                                    <p>${MAX_MISTAKES} ошибки</p>
                                    <button class="back-btn premium-button" id="restartBtn">🔄 ЗАНОВО</button>
                                    <button class="back-btn premium-button" id="menuBtn">← В МЕНЮ</button>
                                </div>
                            </div>
                        </div>
                    `;

                    document.getElementById('restartBtn').addEventListener('click', () => {
                        currentRound = 0;
                        score = 0;
                        mistakes = 0;
                        gameFailed = false;
                        roundAnswered = false;
                        selectedItem = null;
                        shuffledRounds = game6Rounds.map(round => ({
                            ...round,
                            shuffledItems: shuffleArray(round.items)
                        }));
                        renderGame6();
                    });

                    document.getElementById('menuBtn').addEventListener('click', showGameMenu);
                    return;
                }

                if (gameCompleted) {
                    app.innerHTML = `
                        <div class="soft-screen">
                            <div class="game-container glass-card">
                                <div class="game-header glass-card">
                                    <div class="game-title gradient-text">🎮 НАЙДИ ЛИШНЕЕ</div>
                                    <div class="digit-box pulse">2</div>
                                </div>
                                
                                <div class="fact-card glass-card-deep">
                                    <div class="fact-text" style="font-size: 24px;" class="gradient-text">🎉 ИГРА ПРОЙДЕНА!</div>
                                    <div class="fact-text">Счёт: ${score}/${game6Rounds.length}</div>
                                    <div class="fact-text">Ошибок: ${mistakes}/${MAX_MISTAKES}</div>
                                </div>
                                
                                <button class="get-digit-btn premium-button" id="getDigitBtn6">🎁 ЦИФРА 2</button>
                            </div>
                        </div>
                    `;

                    document.getElementById('getDigitBtn6').addEventListener('click', () => {
                        collectedDigits[5] = '2';
                        showGameMenu();
                    });
                    return;
                }

                const round = shuffledRounds[currentRound];
                const correctIndex = round.shuffledItems.indexOf(round.correctItem);

                let itemsHtml = '';
                round.shuffledItems.forEach((item, idx) => {
                    let itemClass = 'option-emoji';
                    if (roundAnswered) {
                        if (idx === correctIndex) {
                            itemClass += ' selected-correct';
                        } else if (selectedItem === idx && idx !== correctIndex) {
                            itemClass += ' selected-wrong';
                        }
                    }
                    itemsHtml += `<div class="${itemClass}" data-index="${idx}">${item}</div>`;
                });

                app.innerHTML = `
                    <div class="soft-screen">
                        <div class="game-container glass-card">
                            <div class="game-header glass-card">
                                <div class="game-title gradient-text">🎮 НАЙДИ ЛИШНЕЕ</div>
                                <div class="digit-box pulse">${collectedDigits[5] !== '_' ? '2' : '_'}</div>
                            </div>

                            <div class="error-counter">
                                ❌ <span class="error-badge">${mistakes}/${MAX_MISTAKES}</span>
                            </div>

                            <div class="score">${currentRound + 1}/${game6Rounds.length} · ${score}</div>

                            <div class="options-grid glass-card-deep" id="optionsGrid">
                                ${itemsHtml}
                            </div>

                            ${roundAnswered ? 
                                `<div class="explanation glass-card">
                                    ${round.explanation}
                                </div>` : 
                                ''
                            }

                            ${roundAnswered && currentRound < game6Rounds.length - 1 ? 
                                `<button class="next-btn premium-button" id="nextRoundBtn">→</button>` : 
                                (roundAnswered && currentRound === game6Rounds.length - 1 ?
                                    `<button class="get-digit-btn premium-button" id="finishGame6Btn">✅ ЗАВЕРШИТЬ</button>` : 
                                    ''
                                )
                            }
                        </div>
                    </div>
                `;

                document.querySelectorAll('.option-emoji').forEach(el => {
                    el.addEventListener('click', () => {
                        if (roundAnswered) return;
                        
                        const idx = parseInt(el.dataset.index);
                        selectedItem = idx;
                        roundAnswered = true;
                        
                        if (idx === correctIndex) {
                            score++;
                        } else {
                            mistakes++;
                            if (mistakes >= MAX_MISTAKES) {
                                gameFailed = true;
                            }
                        }
                        
                        renderGame6();
                    });
                });

                if (document.getElementById('nextRoundBtn')) {
                    document.getElementById('nextRoundBtn').addEventListener('click', () => {
                        currentRound++;
                        roundAnswered = false;
                        selectedItem = null;
                        renderGame6();
                    });
                }

                if (document.getElementById('finishGame6Btn')) {
                    document.getElementById('finishGame6Btn').addEventListener('click', () => {
                        gameCompleted = true;
                        renderGame6();
                    });
                }
            }

            renderGame6();
        }

        // ========== ИГРА 7 ==========
        function showGame7() {
            let gameCompleted = collectedDigits[6] !== '_';
            let errorMessage = '';

            function renderGame7() {
                if (gameCompleted) {
                    app.innerHTML = `
                        <div class="soft-screen">
                            <div class="game-container glass-card">
                                <div class="game-header glass-card">
                                    <div class="game-title gradient-text">🎮 ШИФР</div>
                                    <div class="digit-box pulse">7</div>
                                </div>
                                
                                <div class="fact-card glass-card-deep">
                                    <div class="fact-text" style="font-size: 24px;" class="gradient-text">🔓 КОД ПРИНЯТ!</div>
                                    <div class="fact-text">Цифра 7 получена</div>
                                </div>
                                
                                <button class="get-digit-btn premium-button" id="getDigitBtn7">🎁 ЦИФРА 7</button>
                            </div>
                        </div>
                    `;

                    document.getElementById('getDigitBtn7').addEventListener('click', () => {
                        collectedDigits[6] = '7';
                        showGameMenu();
                    });
                    return;
                }

                app.innerHTML = `
                    <div class="soft-screen">
                        <div class="game-container glass-card">
                            <div class="game-header glass-card">
                                <div class="game-title gradient-text">🎮 ШИФР</div>
                                <div class="digit-box pulse">${collectedDigits[6] !== '_' ? '7' : '_'}</div>
                            </div>

                            <div class="fact-card glass-card-deep">
                                <div class="cipher-container">
                                    <p style="font-size: 16px; color: #ff69b4;">🔐 ВВЕДИ КОД</p>
                                    
                                    <div class="cipher-numbers glitch-text" style="font-size: 48px; letter-spacing: 10px;">
                                        ???
                                    </div>
                                    
                                    <div class="hint">
                                        Подсказка: МОЁ ЛЮБИМОЁ ЧИСЛО.
                                    </div>

                                    <div class="input-group">
                                        <input 
                                            type="text" 
                                            id="cipherInput" 
                                            class="cipher-input glass-card" 
                                            placeholder="Введи код"
                                            maxlength="3"
                                            inputmode="numeric"
                                            pattern="[0-9]*"
                                        >
                                        <button class="premium-button" id="checkBtn" style="padding: 12px;">ПРОВЕРИТЬ</button>
                                    </div>

                                    ${errorMessage ? 
                                        `<div class="error-message">❌ ${errorMessage}</div>` : 
                                        ''
                                    }
                                </div>
                            </div>

                            <button class="back-btn premium-button" id="menuBtn">← МЕНЮ</button>
                        </div>
                    </div>
                `;

                document.getElementById('checkBtn').addEventListener('click', () => {
                    const answer = document.getElementById('cipherInput').value.trim();
                    
                    if (answer === '993') {
                        gameCompleted = true;
                        renderGame7();
                    } else {
                        errorMessage = 'Неверно, попробуй ещё';
                        renderGame7();
                    }
                });

                document.getElementById('menuBtn').addEventListener('click', showGameMenu);
                
                document.getElementById('cipherInput').addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') {
                        document.getElementById('checkBtn').click();
                    }
                });
            }

            renderGame7();
        }

        // ========== ЗАПУСК ==========
        createPremiumParticles();
        createBinaryRain();
        setInterval(createBinaryRain, 25000);
        
        showLogin();
    </script>
</body>
</html>
